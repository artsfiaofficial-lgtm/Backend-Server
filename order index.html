<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Upload</title>
</head>

<body>

    <h2>Upload Order</h2>

    <!-- Front Image -->
    <input type="file" id="frontImage" />
    <br><br>

    <!-- Sub Photos -->
    <input type="file" id="subPhotos" multiple />
    <br><br>

    <button onclick="fetchData()">Submit</button>

</body>

<script>
    // ✅ Compress + convert to base64
    function compressImage(file, quality = 0.5, maxWidth = 600) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const reader = new FileReader();

            reader.readAsDataURL(file);

            reader.onload = e => {
                img.src = e.target.result;
            };

            img.onload = () => {
                const canvas = document.createElement("canvas");

                let width = img.width;
                let height = img.height;

                // resize
                if (width > maxWidth) {
                    height = height * (maxWidth / width);
                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);

                // compress
                const base64 = canvas.toDataURL("image/jpeg", quality);
                resolve(base64);
            };

            reader.onerror = error => reject(error);
        });
    }

    async function fetchData() {
        try {
            const frontFile = document.getElementById("frontImage").files[0];
            const subFiles = document.getElementById("subPhotos").files;

            // ✅ single image
            const frontImage = frontFile
                ? await compressImage(frontFile, 0.5, 600)
                : "";

            // ✅ multiple images (map)
            const subPhotos = await Promise.all(
                Array.from(subFiles).map(file =>
                    compressImage(file, 0.5, 600)
                )
            );

            const url = 'http://localhost:3000/api/order/new';

            const res = await fetch(url, {
                method: "POST",
                headers: {
                    'Content-Type': "application/json"
                },
                body: JSON.stringify({
                    address: 'Kadamtoli, Dhaka',
                    bangleSize: "2.2",
                    date: "12 July",
                    deliveryCharge: "60",
                    division: "Dhaka",
                    email: "elifbilge@gmail.com",
                    message: "This is a message",
                    name: "Elif",
                    phoneNumber: "01584255465",
                    productCategory: "Bangle",

                    // images
                    productFrontImageLink: frontImage,
                    productSubPhotos: subPhotos,

                    productIdKey: "",
                    productPerPrice: "120",
                    productQuantity: "3",
                    productStatus: "available",
                    productTitle: "New Cloth",
                    totalPrice: "560"
                })
            });

            // ✅ safe response handling (no double read error)
            const text = await res.text();

            try {
                const data = JSON.parse(text);
                console.log("Success:", data);
            } catch {
                console.log("Not JSON:", text);
            }

        } catch (err) {
            console.log("Error:", err);
        }
    }

    
</script>

</html>
