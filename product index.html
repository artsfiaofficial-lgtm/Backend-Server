<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>Front Image</p>
    <input class="frontImg" type="file">
    <p>Multiple Image</p>
    <input multiple class="multipleImg" type="file">
    <button onclick="uploadData()">Upload</button>
</body>
<script>
    //function to compress image
    function compressImage(file, quality=0.7, maxWidth=1000) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const reader = new FileReader();

            reader.readAsDataURL(file);
            reader.onload = e => {
                img.src = e.target.result;
            };
            img.onload = () => {
                const canvas = document.createElement("canvas");
                let width = img.width;
                let height = img.height;
                // resize
                if (width > maxWidth) {
                    height = height * (maxWidth / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                // compress
                const base64 = canvas.toDataURL("image/jpeg", quality);
                resolve(base64);
            };

            reader.onerror = error => reject(error);
        });
    }

    async function uploadData() {
        const frontImage = document.querySelector('.frontImg').files[0]
        const multipleImage = document.querySelector('.multipleImg').files

        const compressedFrontImg = await compressImage(frontImage)
        const compressedMultipleImg = await Promise.all(
            Array.from(multipleImage).map(item =>
                compressImage(item)
            )
        )

        const url = 'http://localhost:3000/api/product/new'
        const res = fetch(url, {
            method: "POST",
            headers: {
                'Content-Type': "application/json"
            },
            body: JSON.stringify({
                bangleCategory : "Premium",
                productCategory : "Bangle",
                productFrontImageLink : compressedFrontImg,
                productImageLinks : compressedMultipleImg,

                productMrpPrice : 850,
                productPrice : 800,
                productStatus : "In Stock",
                productTitle : "New Branded Cloath"
            })
        })
    } 
</script>

</html>
